apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: corp-web-ingress
  namespace: corp-web
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod   # 🔹 Reference staging ClusterIssuer
spec:
  tls:
  - hosts:
    - digitalqatalyst.com   # 🔹 Replace with your domain
    secretName: corp-web-tls # 🔹 Secret will be created automatically
  rules:
  - host: digitalqatalyst.com
    http:
      paths:
      - path: /corp-web
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
