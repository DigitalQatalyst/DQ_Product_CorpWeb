trigger:
  branches:
    include:
      - main  # change if deploying from a different branch

pr:
  branches:
    include:
      - main

variables:
  # Replace these with the variable names in your Azure DevOps Library
  ACR_NAME: $(ACR_NAME)
  IMAGE_NAME: myapp
  AKS_RESOURCE_GROUP: KF_SampleAKS
  AKS_CLUSTER_NAME: kf_sample_cluster
  NAMESPACE: staging

stages:
- stage: Build_and_Deploy
  displayName: Build & Deploy to Staging
  jobs:
  - job: BuildDeploy
    displayName: Build Docker & Deploy
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    # 1️⃣ Checkout repo
    - task: Checkout@1

    # 2️⃣ Azure CLI login using service connection
    - task: AzureCLI@2
      inputs:
        azureSubscription: 'KF-ServiceConnection'  # Set up in Project Settings → Service connections
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          echo "Logged into Azure CLI"

    # 3️⃣ Login to ACR
    - task: Docker@2
      displayName: Build and Push Image
      inputs:
        containerRegistry: 'KF-ACR-ServiceConnection'  # Set up in Azure DevOps for ACR
        repository: $(IMAGE_NAME)
        command: buildAndPush
        Dockerfile: Dockerfile
        tags: |
          $(Build.BuildId)

    # 4️⃣ Get AKS credentials and deploy
    - task: AzureCLI@2
      displayName: Deploy to AKS Staging
      inputs:
        azureSubscription: 'KF-ServiceConnection'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          # Get AKS credentials
          az aks get-credentials --resource-group $(AKS_RESOURCE_GROUP) --name $(AKS_CLUSTER_NAME) --overwrite-existing
          
          # Deploy to staging namespace (apply manifests)
          kubectl apply -f k8s/ -n $(NAMESPACE)
          
          # Optionally verify rollout
          kubectl rollout status deployment/$(IMAGE_NAME) -n $(NAMESPACE)
